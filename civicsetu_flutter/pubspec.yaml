name: civicsetu_flutter
description: CIVICSETU mobile app rebuilt in Flutter for Android.
publish_to: "none"
version: 1.0.3+4

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: any
  flutter_map: any
  geolocator: any
  http: ^1.6.0
  image: ^4.5.4
  image_picker: any
  latlong2: any
  shared_preferences: any
  speech_to_text: any
  supabase_flutter: ^2.12.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
